name: Setup Windows with Tailscale

on:
  workflow_dispatch:

jobs:
  windows-setup:
    runs-on: windows-latest

    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Download Tailscale
      run: |
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-ipn-setup.exe" -OutFile "$env:TEMP\tailscale-installer.exe"
        Start-Process "$env:TEMP\tailscale-installer.exe" -ArgumentList "/quiet" -Wait

    - name: Start Tailscale Service
      run: |
        Start-Service Tailscale
        Set-Service Tailscale -StartupType Automatic

    - name: Authenticate Tailscale
      env:
        TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      run: |
        tailscale up --authkey $env:TAILSCALE_AUTHKEY --accept-routes --hostname github-runner

    - name: Verify Tailscale Status
      run: |
        tailscale status
