name: Setup Windows with Tailscale 1.96.3

on:
  workflow_dispatch:

jobs:
  windows-setup:
    runs-on: windows-latest

    steps:
    - name: Enable Remote Desktop
      run: |
        # 开启远程桌面
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        # 允许防火墙远程桌面
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Download and Install Tailscale 1.96.3
      run: |
        $InstallerUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.96.3-amd64.msi"
        $InstallerPath = "$env:TEMP\tailscale-setup-1.96.3-amd64.msi"
        Invoke-WebRequest -Uri $InstallerUrl -OutFile $InstallerPath
        # 静默安装 MSI
        Start-Process msiexec.exe -ArgumentList "/i `"$InstallerPath`" /qn /norestart" -Wait

    - name: Start Tailscale Service
      run: |
        Start-Service Tailscale
        Set-Service Tailscale -StartupType Automatic

    - name: Authenticate Tailscale
      env:
        TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      run: |
        tailscale up --authkey $env:TAILSCALE_AUTHKEY --accept-routes --hostname github-runner

    - name: Verify Tailscale Status
      run: |
        tailscale status
