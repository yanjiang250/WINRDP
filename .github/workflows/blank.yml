name: Windows RDP + Tailscale
run-name: ${{ github.actor }} Windows-RDP-Tailscale

on:
  workflow_dispatch:

jobs:
  win-rdp-tailscale:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System Info
        run: |
          systeminfo | findstr /C:"OS Name" /C:"OS Version"
          hostname
        shell: cmd

      - name: Enable RDP Service
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        shell: powershell

      - name: Create User RDP
        run: |
          net user RDP 1234@Abc /add /y
          net localgroup administrators RDP /add
        shell: cmd

      - name: Install Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "tailscale.msi"
          msiexec /i tailscale.msi /qn
          Start-Sleep -Seconds 10
          $env:Path += ";C:\Program Files\Tailscale IPN"
        shell: powershell

      - name: Tailscale Login
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          tailscale up --authkey=$env:TAILSCALE_AUTHKEY --unattended --accept-routes
          tailscale status
          tailscale ip -4
        shell: powershell

      - name: Login Info
        run: |
          echo "========================================"
          echo "✅ RDP 登录信息"
          echo "账号：RDP"
          echo "密码：1234@Abc"
          echo "========================================"
          while($true){Start-Sleep -Seconds 60}
        shell: powershell
