name: Setup Windows with Tailscale

on:
  workflow_dispatch:

jobs:
  windows-setup:
    runs-on: windows-latest

    steps:
    - name: Enable Remote Desktop
      run: |
        # 开启远程桌面
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        # 允许防火墙远程桌面
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Download and Install Latest Tailscale
      run: |
        # 自动获取最新 GitHub Release Windows 安装器
        $LatestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/tailscale/tailscale/releases/latest"
        $InstallerUrl = $LatestRelease.assets | Where-Object { $_.name -like "*windows*" } | Select-Object -First 1 -ExpandProperty browser_download_url
        Write-Host "Downloading Tailscale from $InstallerUrl"
        Invoke-WebRequest -Uri $InstallerUrl -OutFile "$env:TEMP\tailscale-installer.exe"
        # 静默安装
        Start-Process "$env:TEMP\tailscale-installer.exe" -ArgumentList "/quiet" -Wait

    - name: Start Tailscale Service
      run: |
        Start-Service Tailscale
        Set-Service Tailscale -StartupType Automatic

    - name: Authenticate Tailscale
      env:
        TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      run: |
        tailscale up --authkey $env:TAILSCALE_AUTHKEY --accept-routes --hostname github-runner

    - name: Verify Tailscale Status
      run: |
        tailscale status
